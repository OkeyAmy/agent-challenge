name: Forge — Build & Push Docker Image

on:
  push:
    branches:
      - main
    paths:
      - "forge/**"
      - ".github/workflows/forge-docker.yml"
  workflow_dispatch:   # allow manual trigger from GitHub UI

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/forge

jobs:
  build-and-push:
    name: Build Rust binary → Docker image → Push to Docker Hub
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Rust toolchain ─────────────────────────────────────────
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.82"

      # ── 3. Cache Cargo registry + build artefacts ─────────────────
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            forge/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('forge/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # ── 4. Build the forge binary ──────────────────────────────────
      - name: Build forge (release)
        working-directory: forge
        run: cargo build --release -p forge

      # ── 5. Set up Docker Buildx ────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 6. Log in to Docker Hub ────────────────────────────────────
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── 7. Build sandbox image (python:3.11-slim + git) ───────────
      - name: Build forge-sandbox base image
        working-directory: forge
        run: docker build -f Dockerfile.sandbox -t forge-sandbox:latest .

      # ── 8. Copy binary into build context ─────────────────────────
      - name: Prepare binary for Docker context
        working-directory: forge
        run: cp target/release/forge forge_bin

      # ── 9. Build & push forge image ───────────────────────────────
      - name: Build and push forge image
        uses: docker/build-push-action@v5
        with:
          context: forge
          file: forge/Dockerfile.release
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── 10. Cleanup binary from context ───────────────────────────
      - name: Cleanup forge_bin
        working-directory: forge
        run: rm -f forge_bin

      # ── 11. Print image digest ─────────────────────────────────────
      - name: Summary
        run: |
          echo "### Docker image pushed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Image:** \`${{ env.IMAGE_NAME }}:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "- **SHA tag:** \`${{ env.IMAGE_NAME }}:${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Nosana job def:** \`forge/nos_job_def/forge_job_definition.json\`" >> $GITHUB_STEP_SUMMARY
